<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Base glowing gradient -->
    <linearGradient id="neonCyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#05e7ff" />
      <stop offset="100%" stop-color="#007bff" />
    </linearGradient>

    <!-- Edge lighting for the dark center -->
    <linearGradient id="darkBevel" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2a2a2a" />
      <stop offset="100%" stop-color="#0a0a0a" />
    </linearGradient>

    <!-- Outer Glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Transparent Background! -->
  <rect width="100%" height="100%" fill="transparent" />

  <g transform="translate(256, 256)">
    <!-- Base Outer Hexagon for framing -->
    <polygon points="0,-220 190,-110 190,110 0,220 -190,110 -190,-110" 
             fill="none" 
             stroke="url(#neonCyan)" 
             stroke-width="8" 
             opacity="0.15" />
    
    <!-- Inner Cybernetic "A" Geometry -->
    <g filter="url(#glow)">
      <!-- Outer thick rim of the A -->
      <path d="M 0,-160 L 120,130 L 70,130 L 40,60 L -40,60 L -70,130 L -120,130 Z" 
            fill="url(#darkBevel)" 
            stroke="url(#neonCyan)" 
            stroke-width="16" stroke-linejoin="round" />
            
      <!-- Floating triangle center -->
      <path d="M 0,-30 L 25,25 L -25,25 Z" 
            fill="url(#neonCyan)" />

      <!-- High-tech circuit accent lines -->
      <line x1="-150" y1="-50" x2="-80" y2="-50" stroke="#05e7ff" stroke-width="6" opacity="0.8" stroke-linecap="round" />
      <circle cx="-160" cy="-50" r="10" fill="#05e7ff" opacity="0.8"/>

      <line x1="150" y1="-50" x2="80" y2="-50" stroke="#05e7ff" stroke-width="6" opacity="0.8" stroke-linecap="round" />
      <circle cx="160" cy="-50" r="10" fill="#05e7ff" opacity="0.8"/>
      
      <!-- Energy node at the very top -->
      <circle cx="0" cy="-190" r="16" fill="#05e7ff" />
      <circle cx="0" cy="-190" r="8" fill="#ffffff" />
    </g>
  </g>
</svg>
